{{ template "header.html" . }}
    <h1>Cursos</h1>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Horas</th>
        </tr>
      </thead>
      <body>
        {{ range . }}
        <tr>
          <td>{{ .Nome }}</td>
          <td>{{ .CargaHoraria }}</td>
        </tr>
        {{ end }}
      </body>
    </table>
{{ template "footer.html" . }}
